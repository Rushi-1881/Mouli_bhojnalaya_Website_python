{% extends 'base.html' %}
{% block content %}

<div class="container my-5">
    <h2 class="text-center mb-4 fw-bold text-gradient" data-aos="fade-down">Explore Our Menu</h2>

    <div class="d-flex flex-wrap justify-content-center gap-2 mb-5" data-aos="fade-up">
        <button class="btn btn-danger rounded-pill px-4 filter-btn active" onclick="filterMenu('all')">All Items</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Specialty')">Specialty</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Thali')">Thalis</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Main Course')">Sabzi</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Dal')">Dal</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Breads')">Breads</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Rice')">Rice</button>
        <button class="btn btn-outline-danger rounded-pill px-4 filter-btn" onclick="filterMenu('Beverages')">Drinks</button>
    </div>

    <div class="row g-4" id="menu-grid">
        {% for item in menu %}
        <div class="col-md-4 menu-item-column {{ item.category }}" data-aos="zoom-in">
            <div class="card h-100 shadow-sm premium-card pb-2">
                <img src="{{ url_for('static', filename=item.image_url) }}" class="card-img-top" alt="{{ item.name }}" style="height: 200px; object-fit: cover;">
                
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0 text-dark">{{ item.name }}</h5>
                        <span class="badge bg-danger rounded-pill">₹{{ item.price }}</span>
                    </div>
                    <p class="card-text text-muted small" style="min-height: 40px;">{{ item.description }}</p>
                    
                    <div class="mt-3 pt-3 border-top">
                        <a href="{{ url_for('add_to_cart', item_id=item.id) }}" class="btn btn-danger w-100 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-cart-plus me-2"></i> Add to Cart
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="no-items" class="text-center py-5 d-none">
        <i class="fas fa-utensils fa-3x text-muted mb-3"></i>
        <h4 class="text-muted">No items found in this category.</h4>
    </div>
</div>

<script>
function filterMenu(category) {
    const items = document.querySelectorAll('.menu-item-column');
    const buttons = document.querySelectorAll('.filter-btn');
    let visibleCount = 0;

    // Active button styling change
    buttons.forEach(btn => {
        if(btn.innerText.includes(category) || (category === 'all' && btn.innerText === 'All Items')) {
            btn.classList.add('btn-danger', 'active');
            btn.classList.remove('btn-outline-danger');
        } else {
            btn.classList.remove('btn-danger', 'active');
            btn.classList.add('btn-outline-danger');
        }
    });

    // Filtering logic
    items.forEach(item => {
        if (category === 'all' || item.classList.contains(category)) {
            item.style.display = 'block';
            visibleCount++;
        } else {
            item.style.display = 'none';
        }
    });

    // Show message if category is empty
    const noItemsDiv = document.getElementById('no-items');
    if (visibleCount === 0) {
        noItemsDiv.classList.remove('d-none');
    } else {
        noItemsDiv.classList.add('d-none');
    }
}
</script>

{% endblock %}
