<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhojnalaya Mauli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--primary-color);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-utensils"></i> Bhojnalaya Mauli</a>
        </div>
    </nav>

    <header class="hero-section" data-aos="fade-in" data-aos-duration="1500">
        <div class="container">
            <h1 class="display-3 fw-bold">Welcome to Bhojnalaya Mauli</h1>
            <p class="lead fs-4">Authentic, Delicious, and Made with Love.</p>
            <a href="#menu" class="btn btn-warning btn-lg mt-3 fw-bold shadow">View Our Menu</a>
        </div>
    </header>

    <section id="menu" class="container my-5">
        <h2 class="text-center mb-5 fw-bold" style="color: var(--primary-color);" data-aos="fade-up">Our Special Menu</h2>
        
        <div class="row g-4">
            {% for item in menu %}
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                <div class="card h-100 shadow-sm menu-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title fw-bold mb-0">{{ item.name }}</h5>
                            <span class="badge bg-danger rounded-pill fs-6">₹{{ item.price }}</span>
                        </div>
                        <span class="badge bg-warning text-dark mb-3">{{ item.category }}</span>
                        <p class="card-text text-muted">{{ item.description }}</p>
                    </div>
                    <div class="card-footer bg-white border-top-0 pb-3">
                        <a href="https://wa.me/910000000000?text=Hello Bhojnalaya Mauli, I would like to order: {{ item.name }}" target="_blank" class="btn w-100 fw-bold text-white" style="background-color: var(--primary-color);">
                            <i class="fab fa-whatsapp"></i> Order on WhatsApp
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <a href="https://wa.me/910000000000?text=Hello Bhojnalaya Mauli, I have an inquiry!" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp whatsapp-icon"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Scroll Animations
        AOS.init({
            once: true // Animation happens only once when scrolling down
        });
    </script>
</body>
</html>
