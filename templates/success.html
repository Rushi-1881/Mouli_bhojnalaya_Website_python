{% extends 'base.html' %}
{% block content %}

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<div class="container my-5" data-aos="zoom-in">
    <div class="row justify-content-center text-center">
        <div class="col-md-8 col-lg-6">
            <div class="card premium-card shadow-lg border-0 rounded-4 p-5">
                
                <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_rc5d0f61.json"  background="transparent"  speed="1"  style="width: 200px; height: 200px; margin: 0 auto;" autoplay></lottie-player>
                
                <h2 class="fw-bolder text-success mt-3">Order Confirmed!</h2>
                <p class="text-muted fs-5 mb-4">Your order has been saved successfully. Please prepare to pick it up from the store.</p>
                
                <div class="alert alert-danger rounded-pill shadow-sm mb-4">
                    <i class="fab fa-whatsapp fs-5 align-middle me-2"></i> Opening WhatsApp to send your order details...
                </div>

                <a href="{{ url_for('home') }}" class="btn btn-outline-danger btn-lg rounded-pill px-5">Return to Home</a>
                
                <div class="mt-4">
                    <small class="text-muted">If WhatsApp doesn't open automatically, <a href="{{ whatsapp_url }}" target="_blank" class="fw-bold text-success">click here</a>.</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    setTimeout(function() {
        window.open("{{ whatsapp_url|safe }}", "_blank");
    }, 1500); // 1.5 seconds delay so they can see the success animation
</script>

{% endblock %}
